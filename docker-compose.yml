services:
  app:
    # Prebuilt multi-arch image (amd64 + arm64, works on Raspberry Pi as-is).
    # The package is private, so run `docker login ghcr.io` before `docker
    # compose pull` on a new host. `build: .` is kept so local dev can still
    # do `docker compose up --build` from source instead.
    image: ghcr.io/mamissaoui/fatura-cloud:${VERSION:-latest}
    build:
      context: .
      args:
        # Optional: set in your own .env to enable Sentry error tracking on a
        # locally-built image. Left unset, this build has no DSN, same as the
        # published GHCR image — see CLAUDE.md's Environment Variables section.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "8080:8080"
    volumes:
      # Bind-mounted subfolder next to this file (not a named volume) so the
      # SQLite database and backups are easy to find, back up, and copy
      # between hosts. The container runs as uid:gid 1000:1000 — on first
      # setup run `mkdir -p ./data && chown -R 1000:1000 ./data` so the
      # non-root app user can write to it (see deploy.md).
      - ./data:/data
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@fatura.cloud}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: unless-stopped
