name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # main.go embeds dist/ via //go:embed all:dist, so vet/test can't
      # compile the root package without the directory existing — a real
      # frontend build isn't needed for that, just a placeholder file. The
      # actual build is exercised by the frontend job below, kept independent
      # so both jobs run in parallel.
      - name: Stub embedded frontend directory
        run: mkdir -p dist && touch dist/index.html

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
